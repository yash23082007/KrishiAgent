services:
  # 1. Python FastAPI Backend Service
  - type: web
    name: krishiagent-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/main.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: krishi_verify_token
      - key: PORT
        value: 8000

  # 2. Next.js Frontend Dashboard Service
  - type: web
    name: krishiagent-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://krishiagent-backend.onrender.com
