services:
  - type: web
    name: krishiagent-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/main.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: krishi_verify_token
      - key: PORT
        value: 8000
